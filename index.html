<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head><link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">
<link rel="icon" href="icon-192.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دفتر حسابداری حمل و نقل</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap">
<style>
  :root{
    --ink:#1B2430;
    --asphalt:#2B3444;
    --paper:#FAF7EF;
    --card:#FFFFFF;
    --amber:#E2A33B;
    --amberDark:#C77F1F;
    --teal:#2F6F62;
    --rose:#C1443C;
    --line:#DED6C2;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Vazirmatn',sans-serif;background:var(--paper);color:var(--ink);}
  header{background:var(--asphalt);color:#fff;}
  .wrap{max-width:960px;margin:0 auto;padding:0 20px;}
  .headrow{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;padding:24px 0;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .icon{width:44px;height:44px;border-radius:12px;background:var(--amber);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;}
  .brand h1{font-size:17px;margin:0;font-weight:800;}
  .brand p{font-size:12px;margin:2px 0 0;color:rgba(255,255,255,.6);}
  button{cursor:pointer;font-family:inherit;}
  .btn-primary{background:var(--amber);border:1px solid var(--amber);color:var(--ink);border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .btn-outline{background:transparent;border:1px solid var(--amber);color:var(--amber);border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .summary{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:-24px;position:relative;z-index:2;}
  @media(min-width:700px){.summary{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  .card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .card .top span{font-size:11px;font-weight:700;opacity:.6;}
  .card .val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;line-height:1;}
  .card .note{font-size:10px;opacity:.5;margin-top:4px;}
  form.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:24px;box-shadow:0 1px 2px rgba(0,0,0,.04);}
  form.panel h2{font-size:15px;margin:0 0 16px;color:var(--asphalt);}
  .grid2{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:640px){.grid2{grid-template-columns:1fr 1fr;}}
  label{display:block;}
  label span{display:block;font-size:12px;font-weight:700;opacity:.7;margin-bottom:6px;}
  input{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:13.5px;background:#fff;outline:none;font-family:inherit;}
  input:focus{border-color:var(--amberDark);}
  .mono{font-family:'JetBrains Mono',monospace;}
  .formbtns{display:flex;gap:10px;margin-top:20px;}
  .btn-save{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13.5px;font-weight:700;}
  .btn-cancel{background:transparent;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:10px 20px;font-size:13.5px;font-weight:700;}
  .toolbar{display:flex;gap:12px;flex-wrap:wrap;margin:32px 0 16px;}
  .search{flex:1;min-width:220px;display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--card);border-radius:8px;padding:9px 12px;}
  .search input{border:none;padding:0;font-size:13.5px;}
  .btn-export{border:1px solid var(--line);background:transparent;color:var(--asphalt);border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;}
  .empty{border:1.5px dashed var(--line);background:var(--card);border-radius:16px;padding:44px 20px;text-align:center;margin-top:16px;}
  .empty .em-icon{font-size:28px;margin-bottom:10px;}
  .empty p.t{font-weight:700;color:var(--asphalt);margin:0;}
  .empty p.s{font-size:12px;opacity:.6;margin:4px 0 0;}
  .records{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:640px){.records{grid-template-columns:1fr 1fr;}}
  .rec{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;position:relative;}
  .rec .body{padding:16px;}
  .rec .rowtop{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;}
  .rec .name{font-weight:700;font-size:14px;color:var(--asphalt);margin:0;}
  .rec .phone{font-size:12px;opacity:.6;margin:3px 0 0;}
  .rec .actions{display:flex;gap:4px;}
  .rec .actions button{width:28px;height:28px;border:none;background:transparent;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
  .rec .actions button:hover{background:rgba(0,0,0,.05);}
  .rec .meta{font-size:12px;opacity:.7;margin:8px 0 0;}
  .rec .notes{font-size:12px;opacity:.6;font-style:italic;margin:8px 0 0;}
  .perf{height:10px;background-image:radial-gradient(circle, var(--paper) 2px, transparent 2.2px);background-size:10px 100%;background-position:center;}
  .stub{border-top:1.5px dashed var(--line);display:grid;grid-template-columns:1fr 1fr 1fr;}
  .stub div{padding:10px 6px;text-align:center;border-right:1px solid var(--line);}
  .stub div:first-child{border-right:none;}
  .stub .lbl{font-size:10px;opacity:.5;font-weight:700;margin:0 0 2px;}
  .stub .v{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:700;margin:0;}
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:16px;}
  .overlay .box{background:var(--card);border-radius:12px;padding:16px;text-align:center;}
  .overlay .box p{font-weight:700;font-size:13.5px;margin:0 0 12px;}
  .overlay .box .btns{display:flex;gap:8px;justify-content:center;}
  .overlay .btn-del{background:var(--rose);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;}
  .overlay .btn-no{border:1px solid var(--line);background:transparent;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;}
  footer.pad{height:60px;}
  .hidden{display:none !important;}
</style>
</head>
<body>

<header>
  <div class="wrap headrow">
    <div class="brand">
      <div class="icon">🚚</div>
      <div>
        <h1>دفتر حسابداری حمل و نقل</h1>
        <p>ثبت بار، کرایه، کمیسیون و تسویه با راننده‌ها</p>
      </div>
    </div>
    <button id="toggleFormBtn" class="btn-primary">➕ بار جدید</button>
  </div>
</header>

<div class="wrap">
  <div class="summary" id="summary"></div>

  <form class="panel hidden" id="recordForm">
    <h2 id="formTitle">ثبت رکورد جدید</h2>
    <div class="grid2">
      <label><span>نام و نام خانوادگی راننده *</span><input required id="f_driverName" placeholder="مثلاً: علی محمدی"></label>
      <label><span>شماره تماس</span><input id="f_phone" placeholder="09xxxxxxxxx" inputmode="tel"></label>
      <label><span>مقصد حمل بار *</span><input required id="f_destination" placeholder="مثلاً: تهران - اصفهان"></label>
      <label><span>تاریخ (میلادی)</span><input type="date" id="f_date">
        <span id="f_dateJalali" style="display:block;font-size:11px;margin-top:5px;opacity:.65;font-family:'JetBrains Mono',monospace;"></span>
      </label>
      <label><span>مبلغ کرایه (تومان)</span><input type="number" min="0" class="mono" id="f_freight" placeholder="0"></label>
      <label><span>کمیسیون شرکت (تومان)</span><input type="number" min="0" class="mono" id="f_commission" placeholder="0"></label>
      <label><span>تخفیف (تومان)</span><input type="number" min="0" class="mono" id="f_discount" placeholder="0"></label>
      <label><span>دریافتی از راننده (تومان)</span><input type="number" min="0" class="mono" id="f_received" placeholder="0"></label>
      <label><span>کمیسیون پس از تخفیف (تومان)</span><input type="text" class="mono" id="f_netCommission" placeholder="0" readonly style="background:var(--paper);font-weight:700;"></label>
      <label><span>توضیحات</span><input id="f_notes" placeholder="اختیاری"></label>
    </div>
    <div class="formbtns">
      <button type="submit" class="btn-save">✔ ثبت در دفتر</button>
      <button type="button" class="btn-cancel" id="cancelBtn">انصراف</button>
    </div>
  </form>

  <div class="toolbar">
    <div class="search">
      🔍 <input id="searchInput" placeholder="جستجو بر اساس نام راننده، مقصد یا شماره تماس...">
    </div>
    <button class="btn-export" id="exportBtn">⬇ خروجی CSV</button>
  </div>

  <div id="listArea"></div>
</div>

<footer class="pad"></footer>

<script>
const STORAGE_KEY = "transport-ledger-records-v1";
let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let editingId = null;
let confirmDeleteId = null;

function todayStr(){ return new Date().toISOString().slice(0,10); }
function toNum(v){ const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function fmtMoney(n){ return Math.round(n).toLocaleString("en-US"); }
function uid(){ return Date.now()+"-"+Math.random().toString(36).slice(2,8); }

// ---- تبدیل تاریخ میلادی به شمسی (بدون نیاز به کتابخانه خارجی) ----
function toJalali(gy, gm, gd){
  const g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
  let jy;
  gy = (gm > 2) ? (gy + 1) : gy;
  let days = 355666 + (365 * gy) + Math.floor((gy + 3) / 4) - Math.floor((gy + 99) / 100) +
             Math.floor((gy + 399) / 400) + gd + g_d_m[gm - 1];
  jy = -1595 + (33 * Math.floor(days / 12053));
  days %= 12053;
  jy += 4 * Math.floor(days / 1461);
  days %= 1461;
  if (days > 365) { jy += Math.floor((days - 1) / 365); days = (days - 1) % 365; }
  let jm, jd;
  if (days < 186) { jm = 1 + Math.floor(days / 31); jd = 1 + (days % 31); }
  else { jm = 7 + Math.floor((days - 186) / 30); jd = 1 + ((days - 186) % 30); }
  return [jy, jm, jd];
}
const persianDigits = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
function toPersianDigits(str){ return String(str).replace(/[0-9]/g, d => persianDigits[d]); }
function formatJalali(dateStr){
  if (!dateStr) return "";
  const [gy, gm, gd] = dateStr.split("-").map(Number);
  const [jy, jm, jd] = toJalali(gy, gm, gd);
  const p = n => String(n).padStart(2,"0");
  return toPersianDigits(`${jy}/${p(jm)}/${p(jd)}`);
}

function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }

function getForm(){
  return {
    driverName: document.getElementById('f_driverName').value.trim(),
    phone: document.getElementById('f_phone').value.trim(),
    destination: document.getElementById('f_destination').value.trim(),
    date: document.getElementById('f_date').value || todayStr(),
    freight: toNum(document.getElementById('f_freight').value),
    commission: toNum(document.getElementById('f_commission').value),
    discount: toNum(document.getElementById('f_discount').value),
    received: toNum(document.getElementById('f_received').value),
    notes: document.getElementById('f_notes').value.trim(),
  };
}

function setForm(r){
  document.getElementById('f_driverName').value = r ? r.driverName : "";
  document.getElementById('f_phone').value = r ? r.phone : "";
  document.getElementById('f_destination').value = r ? r.destination : "";
  document.getElementById('f_date').value = r ? r.date : todayStr();
  document.getElementById('f_freight').value = r ? (r.freight || "") : "";
  document.getElementById('f_commission').value = r ? (r.commission || "") : "";
  document.getElementById('f_discount').value = r ? (r.discount || "") : "";
  document.getElementById('f_received').value = r ? (r.received || "") : "";
  document.getElementById('f_notes').value = r ? (r.notes || "") : "";
  updateJalaliPreview();
  updateNetCommissionPreview();
}

function updateJalaliPreview(){
  const el = document.getElementById('f_dateJalali');
  const val = document.getElementById('f_date').value;
  el.textContent = val ? "شمسی: " + formatJalali(val) : "";
}

function updateNetCommissionPreview(){
  const commission = toNum(document.getElementById('f_commission').value);
  const discount = toNum(document.getElementById('f_discount').value);
  document.getElementById('f_netCommission').value = fmtMoney(Math.max(0, commission - discount));
}

document.getElementById('f_date').addEventListener('input', updateJalaliPreview);
document.getElementById('f_commission').addEventListener('input', updateNetCommissionPreview);
document.getElementById('f_discount').addEventListener('input', updateNetCommissionPreview);

function openForm(){
  document.getElementById('recordForm').classList.remove('hidden');
  document.getElementById('toggleFormBtn').innerHTML = "✕ بستن فرم";
}
function closeForm(){
  document.getElementById('recordForm').classList.add('hidden');
  document.getElementById('toggleFormBtn').innerHTML = "➕ بار جدید";
  editingId = null;
  document.getElementById('formTitle').textContent = "ثبت رکورد جدید";
  setForm(null);
}

document.getElementById('toggleFormBtn').addEventListener('click', () => {
  const isHidden = document.getElementById('recordForm').classList.contains('hidden');
  if (isHidden) { setForm(null); openForm(); } else { closeForm(); }
});
document.getElementById('cancelBtn').addEventListener('click', closeForm);

document.getElementById('recordForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const f = getForm();
  if (!f.driverName || !f.destination) return;
  const rec = { id: editingId || uid(), ...f };
  if (editingId) {
    records = records.map(r => r.id === editingId ? rec : r);
  } else {
    records = [rec, ...records];
  }
  save();
  closeForm();
  render();
});

document.getElementById('searchInput').addEventListener('input', render);

document.getElementById('exportBtn').addEventListener('click', () => {
  const list = getFiltered();
  const header = ["نام راننده","شماره تماس","مقصد","تاریخ (میلادی)","تاریخ (شمسی)","کرایه","کمیسیون","تخفیف","کمیسیون پس از تخفیف","دریافتی از راننده","مانده","توضیحات"];
  const rows = list.map(r => {
    const discount = r.discount || 0;
    const netCommission = Math.max(0, r.commission - discount);
    return [r.driverName, r.phone, r.destination, r.date, formatJalali(r.date), r.freight, r.commission, discount, netCommission, r.received, netCommission - r.received, r.notes || ""];
  });
  const csv = [header, ...rows].map(row => row.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `دفتر-حمل-و-نقل-${todayStr()}.csv`; a.click();
  URL.revokeObjectURL(url);
});

function getFiltered(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = !q ? records : records.filter(r =>
    r.driverName.toLowerCase().includes(q) ||
    r.destination.toLowerCase().includes(q) ||
    (r.phone||"").toLowerCase().includes(q)
  );
  return [...list].sort((a,b) => a.date < b.date ? 1 : a.date > b.date ? -1 : 0);
}

function renderSummary(list){
  const totals = list.reduce((acc,r)=>{
    const discount = r.discount || 0;
    const netCommission = Math.max(0, r.commission - discount);
    acc.freight += r.freight; acc.commission += r.commission; acc.discount += discount;
    acc.received += r.received;
    acc.balance += (netCommission - r.received); return acc;
  }, {freight:0, commission:0, discount:0, received:0, balance:0});

  const cards = [
    {label:"مجموع کرایه", value: totals.freight, color:"var(--asphalt)"},
    {label:"مجموع کمیسیون", value: totals.commission, color:"var(--amberDark)"},
    {label:"مجموع تخفیف", value: totals.discount, color:"var(--rose)"},
    {label:"مجموع دریافتی", value: totals.received, color:"var(--teal)"},
    {label:"مانده حساب", value: totals.balance, color: totals.balance>=0 ? "var(--rose)" : "var(--teal)", note: totals.balance>=0 ? "بدهکاری راننده‌ها" : "طلبکاری راننده‌ها"},
  ];
  document.getElementById('summary').innerHTML = cards.map(c => `
    <div class="card">
      <div class="top"><span>${c.label}</span></div>
      <p class="val" style="color:${c.color}">${fmtMoney(c.value)}</p>
      ${c.note ? `<p class="note">${c.note}</p>` : ""}
    </div>
  `).join("");
}

function renderList(list){
  const area = document.getElementById('listArea');
  if (list.length === 0) {
    area.innerHTML = `
      <div class="empty">
        <div class="em-icon">🚚</div>
        <p class="t">${records.length === 0 ? "هنوز رکوردی ثبت نشده" : "چیزی با این جستجو پیدا نشد"}</p>
        <p class="s">${records.length === 0 ? "برای شروع، دکمهٔ «بار جدید» را بزنید." : "عبارت جستجو را تغییر دهید."}</p>
      </div>`;
    return;
  }
  area.innerHTML = `<div class="records">${list.map(r => {
    const discount = r.discount || 0;
    const netCommission = Math.max(0, r.commission - discount);
    const balance = netCommission - r.received;
    const balColor = balance > 0 ? "var(--rose)" : balance < 0 ? "var(--teal)" : "var(--asphalt)";
    const dateJalali = formatJalali(r.date);
    return `
    <div class="rec" data-id="${r.id}">
      <div class="body">
        <div class="rowtop">
          <div>
            <p class="name">${escapeHtml(r.driverName)}</p>
            ${r.phone ? `<p class="phone">📞 ${escapeHtml(r.phone)}</p>` : ""}
          </div>
          <div class="actions">
            <button class="editBtn" title="ویرایش">✏️</button>
            <button class="delBtn" title="حذف">🗑️</button>
          </div>
        </div>
        <p class="meta">📍 ${escapeHtml(r.destination)} · ${dateJalali}</p>
        ${r.notes ? `<p class="notes">${escapeHtml(r.notes)}</p>` : ""}
      </div>
      <div class="perf"></div>
      <div class="stub" style="grid-template-columns:${discount > 0 ? '1fr 1fr 1fr 1fr' : '1fr 1fr 1fr'};">
        <div><p class="lbl">کرایه</p><p class="v" style="color:var(--asphalt)">${fmtMoney(r.freight)}</p></div>
        <div><p class="lbl">کمیسیون</p><p class="v" style="color:var(--amberDark)">${fmtMoney(r.commission)}</p></div>
        ${discount > 0 ? `<div><p class="lbl">تخفیف</p><p class="v" style="color:var(--rose)">${fmtMoney(discount)}</p></div>` : ""}
        <div><p class="lbl">مانده</p><p class="v" style="color:${balColor}">${fmtMoney(balance)}</p></div>
      </div>
      ${confirmDeleteId === r.id ? `
      <div class="overlay">
        <div class="box">
          <p>این رکورد حذف شود؟</p>
          <div class="btns">
            <button class="btn-del confirmDelBtn">حذف شود</button>
            <button class="btn-no cancelDelBtn">انصراف</button>
          </div>
        </div>
      </div>` : ""}
    </div>`;
  }).join("")}</div>`;

  area.querySelectorAll('.editBtn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const id = e.target.closest('.rec').dataset.id;
      const r = records.find(x => x.id === id);
      editingId = id;
      setForm(r);
      document.getElementById('formTitle').textContent = "ویرایش رکورد";
      openForm();
      window.scrollTo({top:0, behavior:'smooth'});
    });
  });
  area.querySelectorAll('.delBtn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      confirmDeleteId = e.target.closest('.rec').dataset.id;
      render();
    });
  });
  area.querySelectorAll('.confirmDelBtn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const id = e.target.closest('.rec').dataset.id;
      records = records.filter(r => r.id !== id);
      save();
      confirmDeleteId = null;
      render();
    });
  });
  area.querySelectorAll('.cancelDelBtn').forEach(btn => {
    btn.addEventListener('click', () => { confirmDeleteId = null; render(); });
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function render(){
  const list = getFiltered();
  renderSummary(list);
  renderList(list);
}

setForm(null);
render();
</script>
</body>
</html>
